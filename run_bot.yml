name: Run Matrix Bot
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # هذا السطر يجعل الـ Workflow يعيد تشغيل نفسه كل 6 ساعات تلقائياً كإجراء وقائي
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pyTelegramBotAPI
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          # تشغيل البوت في الخلفية
          python bot.py &
          # انتظار لا نهائي لمنع إغلاق الـ Job
          # سنستخدم حلقة لا نهائية ذكية لا تستهلك موارد السيرفر
          while true; do
            sleep 3600
            echo "Matrix Bot is still alive..."
          done
